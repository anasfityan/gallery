<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#0a66ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="معرض الصور">
<link rel="manifest" href="manifest.json">
<title>معرض الصور</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#f0f0f4;font-family:'Noto Sans Arabic',sans-serif;color:#111}

:root{
  --bg:#f0f0f4;
  --surface:#fff;
  --border:rgba(0,0,0,.08);
  --sub:#6e6e78;
  --muted:#b0b0ba;
  --accent:#0a66ff;
}

.shell{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}

/* HERO */
.hero{flex-shrink:0;position:relative;height:320px;background:#111;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.slide.on{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,transparent 45%,transparent 50%,rgba(0,0,0,.6) 100%);pointer-events:none}

.menu-btn{
  position:absolute;top:16px;right:16px;z-index:20;
  width:42px;height:42px;border:none;
  background:rgba(0,0,0,.38);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:13px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  transition:background .15s
}
.menu-btn:active{background:rgba(0,0,0,.6)}
.menu-btn span{display:block;width:19px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.menu-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.menu-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.hero-info{position:absolute;bottom:14px;right:16px;left:16px;display:flex;align-items:flex-end;justify-content:space-between;z-index:5}
.hero-title{color:#fff;font-size:18px;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.hero-loc{color:rgba(255,255,255,.7);font-size:12px;margin-top:3px}
.hero-dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .4s}
.dot.on{background:#fff;width:18px;border-radius:3px}
.hero-prog{position:absolute;bottom:0;left:0;height:2.5px;background:rgba(255,255,255,.65);width:0;z-index:6}
.hero-prog.run{width:100%;transition:width 10s linear}

/* GRID */
.grid-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.grid-wrap::-webkit-scrollbar{display:none}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.5px;padding:2.5px}
.cell{aspect-ratio:1;overflow:hidden;background:#ddd;cursor:pointer;position:relative}
.cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}
.cell:active img{transform:scale(.93)}
.cell.faved::after{content:'❤';position:absolute;top:5px;left:6px;font-size:12px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}

/* DRAWER */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:90;pointer-events:none;transition:background .3s}
.backdrop.on{background:rgba(0,0,0,.42);pointer-events:all}
.drawer{position:fixed;top:0;right:-290px;width:275px;height:100%;background:var(--surface);z-index:100;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.22,1,.36,1);box-shadow:-4px 0 28px rgba(0,0,0,.13)}
.drawer.on{right:0}
.drw-head{padding:52px 18px 18px;border-bottom:1px solid var(--border)}
.drw-logo{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--accent);margin-bottom:6px}
.drw-name{font-size:21px;font-weight:900;letter-spacing:-.5px}
.drw-sub{font-size:12px;color:var(--muted);margin-top:3px}
.drw-body{flex:1;overflow-y:auto;padding:10px 0}
.drw-body::-webkit-scrollbar{display:none}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);padding:12px 18px 5px;text-transform:uppercase}
.drw-item{display:flex;align-items:center;gap:13px;padding:12px 18px;cursor:pointer;transition:background .15s}
.drw-item:active{background:var(--bg)}
.d-icon{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.d-info{flex:1}
.d-name{font-size:15px;font-weight:600}
.d-sub{font-size:12px;color:var(--muted);margin-top:2px}
.d-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.drw-divider{height:1px;background:var(--border);margin:7px 18px}
.drw-foot{padding:14px 18px 36px;border-top:1px solid var(--border)}
.stor-label{font-size:11px;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.stor-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.stor-fill{height:100%;width:62%;background:linear-gradient(90deg,var(--accent),#5eaeff);border-radius:2px}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .22s}
.lb.on{opacity:1;pointer-events:all}
.lb-top{position:absolute;top:0;left:0;right:0;padding:48px 14px 14px;background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent);display:flex;align-items:center;justify-content:space-between;z-index:2}
.lb-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.13);backdrop-filter:blur(10px);border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lb-btn.red{color:#ff453a}
.lb-ctr{color:rgba(255,255,255,.6);font-size:14px;font-weight:500}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.lb-img img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;transition:opacity .2s}
.lb-arr{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:80px;display:flex;align-items:center;justify-content:center;z-index:3;cursor:pointer}
.lb-arr-r{right:0}.lb-arr-l{left:0}
.lb-arr-i{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.lb-bot{position:absolute;bottom:0;left:0;right:0;padding:18px 16px 42px;background:linear-gradient(0deg,rgba(0,0,0,.78) 0%,transparent);z-index:2}
.lb-ph-title{color:#fff;font-size:18px;font-weight:700}
.lb-ph-meta{color:rgba(255,255,255,.55);font-size:13px;margin-top:4px}
.lb-acts{display:flex;gap:8px;margin-top:14px}
.lb-act{flex:1;height:44px;border-radius:12px;background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border:none;color:#fff;font-family:'Noto Sans Arabic',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}

/* SEARCH */
.sv{position:fixed;inset:0;background:var(--surface);z-index:80;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.sv.on{transform:translateY(0)}
.sv-top{padding:50px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sv-box{flex:1;display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:12px;padding:0 13px;height:44px}
.sv-box input{flex:1;border:none;background:transparent;font-family:'Noto Sans Arabic',sans-serif;font-size:15px;color:#111;direction:rtl}
.sv-box input::placeholder{color:var(--muted)}
.sv-box input:focus{outline:none}
.sv-cancel{border:none;background:transparent;font-family:'Noto Sans Arabic',sans-serif;font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0}
.sv-res{flex:1;overflow-y:auto}
.sv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.5px;padding:10px 2.5px 2.5px}
.sv-cell{aspect-ratio:1;overflow:hidden;background:var(--bg);cursor:pointer}
.sv-cell img{width:100%;height:100%;object-fit:cover}
.sv-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.sv-empty-i{font-size:44px;margin-bottom:12px;opacity:.4}

/* ALBUMS */
.av{position:fixed;inset:0;background:var(--bg);z-index:80;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.av.on{transform:translateY(0)}
.av-top{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px}
.av-top-title{flex:1;font-size:19px;font-weight:800}
.av-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;overflow-y:auto}
.alb{background:var(--surface);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.alb:active{transform:scale(.97)}
.alb-img-w{position:relative;aspect-ratio:4/3;overflow:hidden}
.alb-img-w img{width:100%;height:100%;object-fit:cover;display:block}
.alb-img-w::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.42))}
.alb-icon{position:absolute;bottom:8px;right:10px;font-size:22px;z-index:1}
.alb-info{padding:10px 12px 12px}
.alb-name{font-size:14px;font-weight:700}
.alb-count{font-size:12px;color:var(--muted);margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;font-weight:600;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:999}
.toast.on{opacity:1}

*{scrollbar-width:none}*::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div class="shell">
  <div class="hero" id="hero">
    <button class="menu-btn" id="menuBtn" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
    <div class="hero-grad"></div>
    <div class="hero-info">
      <div>
        <div class="hero-title" id="hTitle">—</div>
        <div class="hero-loc" id="hLoc">📍 —</div>
      </div>
      <div class="hero-dots" id="hDots"></div>
    </div>
    <div class="hero-prog" id="hProg"></div>
  </div>
  <div class="grid-wrap">
    <div class="photo-grid" id="photoGrid"></div>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drw-head">
    <div class="drw-logo">Gallery App</div>
    <div class="drw-name">معرض الصور</div>
    <div class="drw-sub">12 صورة · 45.2 MB</div>
  </div>
  <div class="drw-body">
    <div class="sec-label">عرض</div>
    <div class="drw-item" onclick="filterTag('all');toggleDrawer()">
      <div class="d-icon">⊞</div>
      <div class="d-info"><div class="d-name">شبكة الصور</div><div class="d-sub">عرض كل الصور</div></div>
    </div>
    <div class="drw-item" onclick="openAlbums();toggleDrawer()">
      <div class="d-icon">📁</div>
      <div class="d-info"><div class="d-name">الألبومات</div><div class="d-sub">6 ألبومات</div></div>
    </div>
    <div class="drw-item" onclick="openSearch();toggleDrawer()">
      <div class="d-icon">🔍</div>
      <div class="d-info"><div class="d-name">بحث</div><div class="d-sub">ابحث في الصور</div></div>
    </div>
    <div class="drw-divider"></div>
    <div class="sec-label">الفئات</div>
    <div class="drw-item" onclick="filterTag('landscape');toggleDrawer()">
      <div class="d-icon">🏔</div>
      <div class="d-info"><div class="d-name">مناظر طبيعية</div><div class="d-sub">4 صور</div></div>
      <div class="d-badge">4</div>
    </div>
    <div class="drw-item" onclick="filterTag('sea');toggleDrawer()">
      <div class="d-icon">🌊</div>
      <div class="d-info"><div class="d-name">البحر</div><div class="d-sub">2 صور</div></div>
      <div class="d-badge">2</div>
    </div>
    <div class="drw-item" onclick="filterTag('night');toggleDrawer()">
      <div class="d-icon">✨</div>
      <div class="d-info"><div class="d-name">الليل</div><div class="d-sub">1 صورة</div></div>
      <div class="d-badge">1</div>
    </div>
    <div class="drw-item" onclick="filterTag('nature');toggleDrawer()">
      <div class="d-icon">🌿</div>
      <div class="d-info"><div class="d-name">الطبيعة</div><div class="d-sub">3 صور</div></div>
      <div class="d-badge">3</div>
    </div>
    <div class="drw-divider"></div>
    <div class="drw-item" onclick="filterFav();toggleDrawer()">
      <div class="d-icon">❤️</div>
      <div class="d-info"><div class="d-name">المفضلة</div><div class="d-sub" id="favSub">0 صور</div></div>
    </div>
  </div>
  <div class="drw-foot">
    <div class="stor-label"><span>التخزين</span><span>45.2 MB / 64 GB</span></div>
    <div class="stor-bar"><div class="stor-fill"></div></div>
  </div>
</div>

<div class="lb" id="lb">
  <div class="lb-top">
    <button class="lb-btn" onclick="closeLb()">✕</button>
    <div class="lb-ctr" id="lbCtr">1 / 12</div>
    <button class="lb-btn" id="lbFavBtn" onclick="lbFav()">♡</button>
  </div>
  <div class="lb-img"><img id="lbImg" src="" alt="" referrerpolicy="no-referrer"></div>
  <div class="lb-arr lb-arr-r" onclick="lbNav(1)"><div class="lb-arr-i">‹</div></div>
  <div class="lb-arr lb-arr-l" onclick="lbNav(-1)"><div class="lb-arr-i">›</div></div>
  <div class="lb-bot">
    <div class="lb-ph-title" id="lbTitle">—</div>
    <div class="lb-ph-meta" id="lbMeta">—</div>
    <div class="lb-acts">
      <button class="lb-act">⬆ مشاركة</button>
      <button class="lb-act">✎ تعديل</button>
    </div>
  </div>
</div>

<div class="sv" id="sv">
  <div class="sv-top">
    <div class="sv-box">
      <span style="font-size:16px;color:var(--muted)">🔍</span>
      <input type="text" id="svInput" placeholder="ابحث..." oninput="doSearch()">
    </div>
    <button class="sv-cancel" onclick="closeSearch()">إلغاء</button>
  </div>
  <div class="sv-res">
    <div class="sv-grid" id="svGrid"></div>
    <div class="sv-empty" id="svEmpty" style="display:none">
      <div class="sv-empty-i">🔍</div><div>لا توجد نتائج</div>
    </div>
  </div>
</div>

<div class="av" id="av">
  <div class="av-top">
    <button onclick="closeAlbums()" style="width:36px;height:36px;border:none;background:transparent;font-size:26px;cursor:pointer;color:var(--sub)">‹</button>
    <div class="av-top-title">الألبومات</div>
  </div>
  <div class="av-grid" id="avGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const P=[
  {id:1, url:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=70&auto=format&fit=crop",title:"Mountain Peaks",loc:"النمسا",tag:"landscape"},
  {id:2, url:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=70&auto=format&fit=crop",title:"Serene Shore",loc:"المالديف",tag:"sea"},
  {id:3, url:"https://images.unsplash.com/photo-1519904981063-b0cf448d479e?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1519904981063-b0cf448d479e?w=400&q=70&auto=format&fit=crop",title:"City Glow",loc:"نيويورك",tag:"city"},
  {id:4, url:"https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=400&q=70&auto=format&fit=crop",title:"Blue Lake",loc:"سويسرا",tag:"landscape"},
  {id:5, url:"https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=70&auto=format&fit=crop",title:"Deep Forest",loc:"كندا",tag:"nature"},
  {id:6, url:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&q=70&auto=format&fit=crop",title:"Ice Caps",loc:"آيسلندا",tag:"landscape"},
  {id:7, url:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&q=70&auto=format&fit=crop",title:"Milky Way",loc:"الصحراء",tag:"night"},
  {id:8, url:"https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=400&q=70&auto=format&fit=crop",title:"Ocean Waves",loc:"هاواي",tag:"sea"},
  {id:9, url:"https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=400&q=70&auto=format&fit=crop",title:"Grand Canyon",loc:"أريزونا",tag:"landscape"},
  {id:10,url:"https://images.unsplash.com/photo-1440342359743-84fcb8c21f21?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1440342359743-84fcb8c21f21?w=400&q=70&auto=format&fit=crop",title:"Golden Hour",loc:"المغرب",tag:"sky"},
  {id:11,url:"https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=400&q=70&auto=format&fit=crop",title:"Flower Field",loc:"هولندا",tag:"nature"},
  {id:12,url:"https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=900&q=85&auto=format&fit=crop",th:"https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&q=70&auto=format&fit=crop",title:"Autumn Trees",loc:"اليابان",tag:"nature"},
];
const ALBUMS=[
  {name:"المفضلة",icon:"❤️",tag:"fav"},
  {name:"مناظر طبيعية",icon:"🏔",tag:"landscape"},
  {name:"البحر",icon:"🌊",tag:"sea"},
  {name:"الليل",icon:"✨",tag:"night"},
  {name:"المدينة",icon:"🌆",tag:"city"},
  {name:"الطبيعة",icon:"🌿",tag:"nature"},
];

let tag="all",favs=new Set(),hIdx=0,hOrder=[],hTimer=null,lbIdx=0,lbList=[],txS=0;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}

function initHero(){
  hOrder=shuffle(P.map(p=>p.id));
  const hero=document.getElementById('hero');
  P.forEach(p=>{
    const d=document.createElement('div');
    d.className='slide';d.id='sl'+p.id;
    const img=new Image();
    img.referrerPolicy='no-referrer';
    img.alt=p.title;img.src=p.th;
    d.appendChild(img);
    hero.insertBefore(d,hero.querySelector('.hero-grad'));
  });
  hOrder.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot';d.onclick=()=>goSlide(i);
    document.getElementById('hDots').appendChild(d);
  });
  goSlide(0);
  hTimer=setInterval(()=>goSlide((hIdx+1)%hOrder.length),10000);
}

function goSlide(i){
  hIdx=i;
  const pid=hOrder[i],photo=P.find(p=>p.id===pid);
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('on'));
  const sl=document.getElementById('sl'+pid);if(sl)sl.classList.add('on');
  document.getElementById('hTitle').textContent=photo.title;
  document.getElementById('hLoc').textContent='📍 '+photo.loc;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on',j===i));
  const pg=document.getElementById('hProg');
  pg.classList.remove('run');pg.style.transition='none';pg.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{pg.style.transition='width 10s linear';pg.classList.add('run');}));
}

function getFiltered(){
  if(tag==='all')return P;
  if(tag==='fav')return P.filter(p=>favs.has(p.id));
  return P.filter(p=>p.tag===tag);
}

function renderGrid(){
  const list=getFiltered();
  document.getElementById('photoGrid').innerHTML=list.map((p,i)=>
    `<div class="cell${favs.has(p.id)?' faved':''}" onclick="openLb(${i},'grid')"><img src="${p.th}" alt="${p.title}" referrerpolicy="no-referrer" loading="lazy"></div>`
  ).join('');
  document.getElementById('favSub').textContent=favs.size+' صور';
}

function filterTag(t){tag=t;renderGrid();}
function filterFav(){tag='fav';renderGrid();}

function openLb(i,src){
  lbList=src==='search'?getSearch():getFiltered();
  lbIdx=i;renderLb();
  document.getElementById('lb').classList.add('on');
  document.addEventListener('keydown',lbKey);
  const lb=document.getElementById('lb');
  lb.addEventListener('touchstart',e=>{txS=e.touches[0].clientX;},{passive:true});
  lb.addEventListener('touchend',e=>{const d=txS-e.changedTouches[0].clientX;if(Math.abs(d)>50)lbNav(d>0?1:-1);},{passive:true});
}
function closeLb(){document.getElementById('lb').classList.remove('on');document.removeEventListener('keydown',lbKey);}
function renderLb(){
  const p=lbList[lbIdx];if(!p)return;
  const img=document.getElementById('lbImg');
  img.style.opacity='0';img.referrerPolicy='no-referrer';img.src=p.url;
  img.onload=()=>{img.style.opacity='1';};
  document.getElementById('lbTitle').textContent=p.title;
  document.getElementById('lbMeta').textContent='📍 '+p.loc;
  document.getElementById('lbCtr').textContent=(lbIdx+1)+' / '+lbList.length;
  const fb=document.getElementById('lbFavBtn');
  fb.textContent=favs.has(p.id)?'❤':'♡';fb.className='lb-btn'+(favs.has(p.id)?' red':'');
}
function lbNav(d){lbIdx=(lbIdx+d+lbList.length)%lbList.length;renderLb();}
function lbFav(){const p=lbList[lbIdx];if(!p)return;favs.has(p.id)?favs.delete(p.id):favs.add(p.id);renderLb();renderGrid();showToast(favs.has(p.id)?'❤ أُضيفت للمفضلة':'تمت الإزالة');}
function lbKey(e){if(e.key==='ArrowLeft')lbNav(1);if(e.key==='ArrowRight')lbNav(-1);if(e.key==='Escape')closeLb();}

function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('on');
  document.getElementById('backdrop').classList.toggle('on');
  document.getElementById('menuBtn').classList.toggle('open');
}

function openSearch(){document.getElementById('sv').classList.add('on');setTimeout(()=>document.getElementById('svInput').focus(),350);doSearch();}
function closeSearch(){document.getElementById('sv').classList.remove('on');document.getElementById('svInput').value='';}
function getSearch(){const q=document.getElementById('svInput').value.trim().toLowerCase();if(!q)return P;return P.filter(p=>p.title.toLowerCase().includes(q)||p.loc.includes(q)||p.tag.includes(q));}
function doSearch(){
  const res=getSearch();
  const g=document.getElementById('svGrid'),em=document.getElementById('svEmpty');
  if(!res.length){g.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  g.innerHTML=res.map((p,i)=>`<div class="sv-cell" onclick="openLb(${i},'search')"><img src="${p.th}" alt="${p.title}" referrerpolicy="no-referrer" loading="lazy"></div>`).join('');
}

function openAlbums(){
  document.getElementById('av').classList.add('on');
  document.getElementById('avGrid').innerHTML=ALBUMS.map(a=>{
    const cnt=a.tag==='fav'?favs.size:P.filter(p=>p.tag===a.tag).length;
    const cover=(a.tag==='fav'?P[0]:P.find(p=>p.tag===a.tag)||P[0]).th;
    return`<div class="alb" onclick="filterTag('${a.tag}');closeAlbums()">
      <div class="alb-img-w"><img src="${cover}" alt="${a.name}" referrerpolicy="no-referrer" loading="lazy"><div class="alb-icon">${a.icon}</div></div>
      <div class="alb-info"><div class="alb-name">${a.name}</div><div class="alb-count">${cnt} صورة</div></div>
    </div>`;
  }).join('');
}
function closeAlbums(){document.getElementById('av').classList.remove('on');}

let _tt=null;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2000);}

initHero();
renderGrid();

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
