          echo |base64 -d>app/src/main/res/layout/activity_main.xml
          mkdir -p app/src/main/res/layout
          echo |base64 -d>app/src/main/res/layout/activity_fullscreen.xml
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/ZoomImageView.java
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/PhotoAdapter.java
