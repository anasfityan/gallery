          mkdir -p app
          echo |base64 -d>app/build.gradle
          mkdir -p app/src/main
          echo |base64 -d>app/src/main/AndroidManifest.xml
          mkdir -p app/src/main/res/values
          echo PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz48c3RyaW5nIG5hbWU9ImFwcF9uYW1lIj7Zhdi52LHYtiDYp9mE2LXZiNixPC9zdHJpbmc+PHN0cmluZyBuYW1lPSJvcGVuX2RyYXdlciI+2YHYqtitINin2YTZgtin2KbZhdipPC9zdHJpbmc+PC9yZXNvdXJjZXM+Cg==|base64 -d>app/src/main/res/values/strings.xml
