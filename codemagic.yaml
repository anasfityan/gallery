          echo |base64 -d>app/src/main/java/com/gallery/app/FullscreenActivity.java
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/MainActivity.java
          echo |base64 -d>/tmp/mk.py && python3 /tmp/mk.py
          $GRADLE assembleDebug --no-daemon
