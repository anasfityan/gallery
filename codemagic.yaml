          mkdir -p app/src/main/res/drawable
          echo |base64 -d>app/src/main/res/drawable/hero_gradient.xml
          mkdir -p app/src/main/res/drawable
          echo PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIgYW5kcm9pZDpzaGFwZT0icmVjdGFuZ2xlIj4KICAgIDxjb3JuZXJzIGFuZHJvaWQ6cmFkaXVzPSIzZHAiLz4KICAgIDxzb2xpZCBhbmRyb2lkOmNvbG9yPSIjZmZmZmZmIi8+Cjwvc2hhcGU+Cg==|base64 -d>app/src/main/res/drawable/dot_active.xml
          mkdir -p app/src/main/res/drawable
          echo PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIgYW5kcm9pZDpzaGFwZT0ib3ZhbCI+CiAgICA8c29saWQgYW5kcm9pZDpjb2xvcj0iIzg4ZmZmZmZmIi8+Cjwvc2hhcGU+Cg==|base64 -d>app/src/main/res/drawable/dot_inactive.xml
          echo |base64 -d>/tmp/mk_icons.py
          python3 /tmp/mk_icons.py
          $GRADLE assembleDebug --no-daemon
