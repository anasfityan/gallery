          echo |base64 -d>app/src/main/res/values/styles.xml
          mkdir -p app/src/main/res/values
          echo |base64 -d>app/src/main/res/values/colors.xml
          mkdir -p app/src/main/res/layout
          echo |base64 -d>app/src/main/res/layout/activity_main.xml
          mkdir -p app/src/main/res/layout
          echo |base64 -d>app/src/main/res/layout/activity_fullscreen.xml
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/MainActivity.java
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/PhotoAdapter.java
          mkdir -p app/src/main/java/com/gallery/app
          echo |base64 -d>app/src/main/java/com/gallery/app/FullscreenActivity.java
          mkdir -p app/src/main/res/drawable
