          mkdir -p app/src/main/res/drawable
          echo |base64 -d>app/src/main/res/drawable/ic_heart.xml
          mkdir -p app/src/main/res/drawable
          echo |base64 -d>app/src/main/res/drawable/ic_chevron_left.xml
