workflows:
  android-workflow:
    name: Gallery App Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Android App
        script: |
          set -e

          # ── Download Gradle ──────────────────────────────
          curl -sL https://services.gradle.org/distributions/gradle-8.1-bin.zip             -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE=/tmp/gradle-8.1/bin/gradle

          # ── Create project structure ─────────────────────
          mkdir -p app/src/main/java/com/gallery/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # ── settings.gradle ──────────────────────────────
          cat > settings.gradle << 'EOF'
rootProject.name = "GalleryApp"
include ':app'
EOF

          # ── build.gradle (root) ──────────────────────────
          cat > build.gradle << 'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
EOF

          # ── gradle.properties ────────────────────────────
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF

          # ── app/build.gradle ─────────────────────────────
          cat > app/build.gradle << 'EOF'
plugins { id 'com.android.application' }
android {
    namespace 'com.gallery.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.gallery.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
EOF

          # ── AndroidManifest.xml ──────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

          # ── MainActivity.java ────────────────────────────
          cat > app/src/main/java/com/gallery/app/MainActivity.java << 'EOF'
package com.gallery.app;
import android.annotation.SuppressLint;
import android.app.Activity;
import android.os.Bundle;
import android.view.View;
import android.view.Window;
import android.view.WindowManager;
import android.webkit.WebResourceRequest;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
public class MainActivity extends Activity {
    private WebView webView;
    @SuppressLint({"SetJavaScriptEnabled","JavascriptInterface"})
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        requestWindowFeature(Window.FEATURE_NO_TITLE);
        getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
        setContentView(R.layout.activity_main);
        webView = findViewById(R.id.webview);
        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        s.setBuiltInZoomControls(false);
        s.setDisplayZoomControls(false);
        s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
        s.setCacheMode(WebSettings.LOAD_DEFAULT);
        webView.setWebViewClient(new WebViewClient(){
            @Override public boolean shouldOverrideUrlLoading(WebView v,WebResourceRequest r){return false;}
        });
        webView.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);
        webView.setHorizontalScrollBarEnabled(false);
        webView.loadUrl("https://anasfityan.github.io/gallery/");
    }
    @Override public void onBackPressed(){
        if(webView.canGoBack())webView.goBack();
        else super.onBackPressed();
    }
}
EOF

          # ── activity_main.xml ────────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent" android:layout_height="match_parent">
    <WebView android:id="@+id/webview"
        android:layout_width="match_parent" android:layout_height="match_parent"/>
</RelativeLayout>
EOF

          # ── strings.xml ──────────────────────────────────
          cat > app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources><string name="app_name">معرض الصور</string></resources>
EOF

          # ── styles.xml ───────────────────────────────────
          cat > app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
        <item name="colorPrimary">#0a66ff</item>
        <item name="colorPrimaryDark">#0a66ff</item>
        <item name="colorAccent">#0a66ff</item>
        <item name="android:windowFullscreen">true</item>
    </style>
</resources>
EOF

          # ── Icons (generate with Python) ─────────────────
          python3 - << 'PYEOF'
import struct, zlib

def make_png(size, color=(10,102,255)):
    w=h=size
    def chunk(n,d):
        c=zlib.crc32(n+d)&0xffffffff
        return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
    raw=b''
    for y in range(h):
        raw+=b'\x00'
        for x in range(w):
            raw+=bytes(color)+b'\xff'
    png=b'\x89PNG\r\n\x1a\n'
    png+=chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))
    png+=chunk(b'IDAT',zlib.compress(raw))
    png+=chunk(b'IEND',b'')
    return png

dirs={'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
for d,s in dirs.items():
    p=make_png(s)
    for n in['ic_launcher.png','ic_launcher_round.png']:
        open(f'app/src/main/res/{d}/{n}','wb').write(p)
print('Icons OK')
PYEOF

          # ── Build! ───────────────────────────────────────
          $GRADLE assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - from.istanbul50@gmail.com
        notify:
          success: true
          failure: true
