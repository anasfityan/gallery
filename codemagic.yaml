workflows:
  android-workflow:
    name: Gallery App Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Android App
        script: |
          set -e
          curl -sL https://services.gradle.org/distributions/gradle-8.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          GRADLE=/tmp/gradle-8.1/bin/gradle
          mkdir -p app/src/main/java/com/gallery/app
          mkdir -p app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,drawable}
          echo cm9vdFByb2plY3QubmFtZSA9ICJHYWxsZXJ5QXBwIgppbmNsdWRlICI6YXBwIgo=|base64 -d>settings.gradle
          echo YnVpbGRzY3JpcHQgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KICAgIGRlcGVuZGVuY2llcyB7IGNsYXNzcGF0aCAiY29tLmFuZHJvaWQudG9vbHMuYnVpbGQ6Z3JhZGxlOjguMS4wIiB9Cn0KYWxscHJvamVjdHMgeyByZXBvc2l0b3JpZXMgeyBnb29nbGUoKTsgbWF2ZW5DZW50cmFsKCkgfSB9Cg==|base64 -d>build.gradle
